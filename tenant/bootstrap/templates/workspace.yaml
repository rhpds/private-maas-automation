---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workspace-{{ .Values.tenant.username }}
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: tenant/workspace
    helm:
      valuesObject:
        tenant:
          username: {{ .Values.tenant.username }}
          domain: {{ .Values.tenant.domain }}
          tier: {{ .Values.tenant.tier }}
        rocketchat:
          # Use tenant password for RocketChat login
          tenantPassword: {{ .Values.tenant.password | quote }}
  destination:
    name: in-cluster
    namespace: {{ .Values.tenant.username }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: DevWorkspace
      group: workspace.devfile.io
      jsonPointers:
        - /spec/started