image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5

defaultModelTiers:
  - free
  - premium
  - enterprise

models:
  - name: nvidia-nemotron-nano-9b-v2-quantized-w4a16
    displayName: NVIDIA Nemotron Nano 9B v2 Quantized (w4a16)
    uri: oci://registry.redhat.io/rhelai1/modelcar-nvidia-Nemotron-Nano-9B-v2-quantized.w4a16:1.5
    resources:
      limits:
        cpu: "6"
        memory: 32Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 24Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-force-include-usage
      - --max-model-len=131072
      - --max-num-seqs=64
      - --mamba_ssm_cache_dtype=float32
      - --trust-remote-code
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu
