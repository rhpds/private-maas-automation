---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-ai-operator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: redhat-ods-operator
  project: default
  sources:
  - path: charts/install-operators
    repoURL: https://github.com/jharmison-redhat/openshift-setup
    targetRevision: ce78b89b3e1eee5554aa1198f72f8ff50e5adcd8
    helm:
      valueFiles:
        - $values/infra/openshift-ai-operator/values.yaml
  - repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      annotations:
        openshift.io/cluster-monitoring: 'true'
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
