apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-api-maasmodelref
  labels:
    app.kubernetes.io/component: api
    app.kubernetes.io/name: maas-api
    app.kubernetes.io/part-of: models-as-a-service
rules:
- apiGroups:
  - maas.opendatahub.io
  resources:
  - maasmodelrefs
  - maasmodelrefs/status
  verbs:
