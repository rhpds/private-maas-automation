image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.3.0

defaultModelTiers:
  - free
  - premium
  - enterprise

models:
  - name: nvidia-nemotron-nano-9b-v2-fp8
    displayName: NVIDIA Nemotron Nano 9B v2 FP8
    uri: oci://registry.redhat.io/rhelai1/modelcar-nvidia-nemotron-nano-9b-v2-fp8-dynamic:1.5
    mountToolParser: true
    mountReasoningConfig: true
    toolParserConfigMapName: nemotron-tool-parser
    reasoningConfigMapName: nemotron-reasoning-parser
    resources:
      limits:
        cpu: "6"
        memory: 48Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 32Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-force-include-usage
      - --max-model-len=131072
      - --max-num-seqs=64
      - --mamba_ssm_cache_dtype=float32
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-parser-plugin=/opt/parsers/nemotron_toolcall_parser_streaming.py
      - --tool-call-parser=nemotron_json
      - --chat-template-content-format=string
      # Commenting out reasoning arguments as this functionality combined with tool-calling is not ready.
      # - --reasoning-parser-plugin=/opt/reasoning-parsers/nemotron_nano_v2_reasoning_parser.py
      # - --reasoning-parser=nemotron_nano_v2
      # - --structured-outputs-config.enable_in_reasoning=True
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu