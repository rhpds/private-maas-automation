apiVersion: v1
kind: Namespace
metadata:
  name: openshift-gitops
  annotations:
    openshift.io/cluster-monitoring: 'true'
---
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
spec:
  resourceTrackingMethod: annotation
  server:
    route:
      enabled: true
