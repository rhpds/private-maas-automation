{{- range .Values.models }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    opendatahub.io/dashboard: "true"
  name: {{ .name }}-view-role
rules:
- apiGroups:
  - serving.kserve.io
  resourceNames:
  - {{ .name }}
  resources:
  - llminferenceservices
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .name }}-model-get
subjects:
  {{- range $tier := (.tiers | default $.Values.defaultModelTiers) }}
  - kind: Group
    name: system:serviceaccounts:maas-default-gateway-tier-{{ $tier }}
    apiGroup: rbac.authorization.k8s.io
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .name }}-view-role
{{- end }}
