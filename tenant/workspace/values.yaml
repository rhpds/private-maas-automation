# Default values for workspace.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

tenant:
  username: user1
  domain: apps.cluster.example.com
  tier: enterprise

namespacePrefix: wksp

# DevWorkspace configuration
devworkspace:
  name: exercises
  projects:
    repoUrl: https://github.com/taylorjordanNC/coding-exercises
    revision: main
  components:
    - name: universal-developer-image
      container:
        image: registry.redhat.io/devspaces/udi-rhel9:3.21
        sourceMapping: /projects
        # Note: CHE_DASHBOARD_URL will be set dynamically by the template based on tenant.domain
