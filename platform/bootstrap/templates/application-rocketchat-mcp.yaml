---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rocketchat-mcp
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: platform/rocketchat-mcp
    helm:
      valuesObject:
        rocketchat:
          url: "http://rocketchat.rocketchat.svc.cluster.local"
          # Use secret created by rocketchat bot automation job
          existingSecret: "rocketchat-mcp-credentials"
  destination:
    name: in-cluster
    namespace: lls-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
