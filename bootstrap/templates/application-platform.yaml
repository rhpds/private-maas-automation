---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-platform
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: platform/bootstrap
    helm:
      values: |
        bootstrap:
          repoURL: {{ .Values.bootstrap.repoURL }}
          targetRevision: {{ .Values.bootstrap.targetRevision }}
        deployer:
          domain: {{ .Values.deployer.domain }}
        rocketchat:
          adminUsername: {{ .Values.rocketchat.adminUsername }}
          adminPassword: {{ .Values.rocketchat.adminPassword }}
          adminEmail: {{ .Values.rocketchat.adminEmail }}
  destination:
    name: in-cluster
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
