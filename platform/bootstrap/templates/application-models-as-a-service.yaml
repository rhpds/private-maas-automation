---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: models-as-a-service
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: redhat-ods-applications
  project: default
  source:
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    path: platform/models-as-a-service
    helm:
      valuesObject:
        deployer:
          domain: {{ .Values.deployer.domain }}
          certificateName: cert-manager-ingress-cert
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
