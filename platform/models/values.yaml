image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.5

defaultModelTiers:
  - free
  - premium
  - enterprise

models:
  - name: nvidia-nemotron-nano-9b-v2-fp8
    displayName: NVIDIA Nemotron Nano 9b v2 FP8
    uri: oci://registry.redhat.io/rhelai1/modelcar-nvidia-nemotron-nano-9b-v2-fp8-dynamic:1.5
    resources:
      limits:
        cpu: "6"
        memory: 48Gi
        nvidia.com/gpu: "1"
      requests:
        cpu: "4"
        memory: 32Gi
        nvidia.com/gpu: "1"
    extraArgs:
      - --enable-force-include-usage
      - --max-model-len=131072
      - --max-num-seqs=64
      - --mamba_ssm_cache_dtype=float32
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-parser-plugin=/mnt/models/nemotron_toolcall_parser_no_streaming.py
      - --tool-call-parser=nemotron_json
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Equal
        value: l40-gpu
