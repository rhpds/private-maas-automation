apiVersion: v1
kind: ConfigMap
metadata:
  name: nemotron-reasoning-parser
  namespace: llm
data:
  nemotron_nano_v2_reasoning_parser.py: |
    from collections.abc import Sequence
    from typing import TYPE_CHECKING

    if TYPE_CHECKING:
        from vllm.tokenizers import TokenizerLike

    from vllm.entrypoints.openai.protocol import ChatCompletionRequest, DeltaMessage
    try:
        from vllm.entrypoints.openai.protocol import ResponsesRequest
    except ImportError:
        ResponsesRequest = ChatCompletionRequest

    from vllm.reasoning import ReasoningParser, ReasoningParserManager


    @ReasoningParserManager.register_module(name="nemotron_nano_v2", force=True)
    class NemotronNanoV2ReasoningParser(ReasoningParser):
        def __init__(self, tokenizer: "TokenizerLike", *args, **kwargs):
            super().__init__(tokenizer, *args, **kwargs)
            self.think_start = "<think>"
            self.think_end = "</think>"
            self.tool_start = "<TOOLCALL>"
            self.is_think_end = False
            self.in_thinking = False
            self.streaming_buffer = ""

        def is_reasoning_end(self, input_ids: Sequence[int]) -> bool:
            text = self.model_tokenizer.decode(list(input_ids))
            return self.think_end in text

        def extract_content_ids(self, input_ids: list[int]) -> list[int]:
            return []

        def extract_reasoning(
            self,
            model_output: str,
            request: "ChatCompletionRequest | ResponsesRequest",
        ) -> tuple[str | None, str | None]:
            tool_idx = model_output.find(self.tool_start)
            think_start_idx = model_output.find(self.think_start)
            think_end_idx = model_output.find(self.think_end)

            # Tool-only output should stay in content for the tool parser.
            if tool_idx >= 0 and (think_start_idx == -1 or tool_idx < think_start_idx):
                return None, model_output or None

            # Standard <think>...</think>
            if think_start_idx == 0:
                body = model_output[len(self.think_start):]
                tool_idx = body.find(self.tool_start)
                think_end_idx = body.find(self.think_end)

                # Tool call appears before </think> or no </think> yet:
                # keep tool block in content so tool parser can see it.
                if tool_idx >= 0 and (think_end_idx < 0 or tool_idx < think_end_idx):
                    reasoning = body[:tool_idx] or None
                    content = body[tool_idx:] or None
                    return reasoning, content

                if think_end_idx >= 0:
                    reasoning = body[:think_end_idx] or None
                    content = body[think_end_idx + len(self.think_end):] or None
                    return reasoning, content

                # Still thinking, no closing tag yet.
                return body or None, None

            # Closing tag only: treat text before </think> as reasoning.
            if think_end_idx >= 0:
                reasoning = model_output[:think_end_idx] or None
                content = model_output[think_end_idx + len(self.think_end):] or None
                return reasoning, content

            # No reasoning markers: regular content
            return None, model_output or None

        def extract_reasoning_streaming(
            self,
            previous_text: str,
            current_text: str,
            delta_text: str,
            previous_token_ids: Sequence[int],
            current_token_ids: Sequence[int],
            delta_token_ids: Sequence[int],
        ) -> DeltaMessage | None:
            if self.is_think_end:
                return DeltaMessage(content=delta_text or None)

            self.streaming_buffer += delta_text

            tool_idx = self.streaming_buffer.find(self.tool_start)
            think_start_idx = self.streaming_buffer.find(self.think_start)
            think_end_idx = self.streaming_buffer.find(self.think_end)

            # Tool call before any thinking block: send to content immediately.
            if tool_idx >= 0 and (think_start_idx == -1 or tool_idx < think_start_idx):
                content = self.streaming_buffer or None
                self.streaming_buffer = ""
                self.is_think_end = True
                return DeltaMessage(content=content)

            # Enter explicit thinking mode only if output starts with <think>
            if not self.in_thinking and think_start_idx == 0:
                self.in_thinking = True
                self.streaming_buffer = self.streaming_buffer[len(self.think_start):]
                tool_idx = self.streaming_buffer.find(self.tool_start)
                think_end_idx = self.streaming_buffer.find(self.think_end)

            # Handle </think> even if the model never emitted <think>
            if think_end_idx >= 0:
                reasoning = self.streaming_buffer[:think_end_idx] or None
                content = self.streaming_buffer[think_end_idx + len(self.think_end):] or None
                self.streaming_buffer = ""
                self.is_think_end = True
                return DeltaMessage(reasoning=reasoning, content=content)

            # Tool call begins during thinking: split reasoning/content there
            if self.in_thinking and tool_idx >= 0:
                reasoning = self.streaming_buffer[:tool_idx] or None
                content = self.streaming_buffer[tool_idx:] or None
                self.streaming_buffer = ""
                self.is_think_end = True
                return DeltaMessage(reasoning=reasoning, content=content)

            # Hold partial </think> fragments so they do not leak
            for l in range(len(self.think_end) - 1, 0, -1):
                partial_end = self.think_end[:l]
                if self.streaming_buffer.endswith(partial_end):
                    reasoning = self.streaming_buffer[:-l] or None
                    self.streaming_buffer = self.streaming_buffer[-l:]
                    return DeltaMessage(reasoning=reasoning) if reasoning else None

            # Before we've identified any boundary, keep buffering instead of
            # leaking text into content.
            if not self.in_thinking:
                return None

            reasoning = self.streaming_buffer or None
            self.streaming_buffer = ""
            return DeltaMessage(reasoning=reasoning) if reasoning else None